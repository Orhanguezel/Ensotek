# GitHub Actions — Ensotek CI/CD
# DISABLED: Auto-deploy on push is turned off.
# Manual only: Go to Actions tab > "Deploy Ensotek" > "Run workflow"
#
# Strategy: SSH into VPS, git pull, build on server, restart PM2
# No artifacts, no rsync — everything happens on VPS directly.
#
# Required GitHub Secrets:
#   VPS_HOST       — server IP
#   VPS_USER       — SSH user (root)
#   VPS_KEY        — private SSH key (ed25519)

name: Deploy Ensotek

on:
  # push to main is DISABLED — uncomment the next line to re-enable
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ensotek
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 600s
          script: |
            set -e
            export PATH="/usr/local/bin:/root/.bun/bin:$PATH"

            REPO=/var/www/Ensotek
            cd $REPO

            echo "========== GIT PULL =========="
            git fetch origin main
            git reset --hard origin/main

            echo "========== BACKEND =========="
            cd $REPO/backend
            bun install --frozen-lockfile || bun install
            bun run build
            echo "Backend build OK"

            echo "========== DE_FRONTEND =========="
            cd $REPO/de_frontend
            bun install --frozen-lockfile || bun install
            bun run build
            echo "de_frontend build OK"

            echo "========== ADMIN PANEL =========="
            cd $REPO/admin_panel
            bun install --frozen-lockfile || bun install
            bun run build
            echo "admin_panel build OK"

            echo "========== DB SEED (no-drop) =========="
            cd $REPO/backend
            bun run db:seed:nodrop || echo "Seed skipped (non-blocking)"

            echo "========== PM2 RESTART =========="
            cd $REPO/backend
            if pm2 describe ensotek-backend > /dev/null 2>&1; then
              pm2 restart ensotek-backend
            else
              pm2 start ecosystem.config.cjs
            fi

            cd $REPO/de_frontend
            if pm2 describe ensotek-frontend > /dev/null 2>&1; then
              pm2 restart ensotek-frontend
            else
              pm2 start ecosystem.config.cjs
            fi

            cd $REPO/admin_panel
            if pm2 describe ensotek-admin-panel > /dev/null 2>&1; then
              pm2 restart ensotek-admin-panel
            else
              pm2 start ecosystem.config.cjs
            fi

            pm2 save

            echo "========== HEALTH CHECK =========="
            sleep 5

            FAIL=0
            for PORT in 8086 3011 3022; do
              if ss -ltnp | grep -q "127.0.0.1:${PORT}"; then
                echo "OK: port $PORT is listening"
              else
                echo "FAIL: port $PORT is NOT listening"
                FAIL=1
              fi
            done

            if [ "$FAIL" -eq 1 ]; then
              echo "Health check failed — dumping PM2 status:"
              pm2 list
              pm2 logs --lines 10 --nostream
              exit 1
            fi

            echo "========== DEPLOY SUCCESS =========="
