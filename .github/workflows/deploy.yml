# GitHub Actions — Ensotek deploy (poly-repo)
#
# Workspace artık poly-repo: her site projesi kendi git reposudur ve VPS'te
# /var/www/Ensotek/<proje> altında o reponun klonu olarak durur.
#
# Bu workflow seçilen projeyi VPS'te günceller — root Ensotek reposuna DOKUNMAZ.
# Otomatik push deploy KAPALI. Manuel: Actions > "Deploy Ensotek" > "Run workflow".
#
# ⚠️ ÖN KOŞUL: VPS /var/www/Ensotek altında yeni poly-repo yapısında olmalı
#    (ensotek_de/, ensotek_com_tr/, kompozit/, kuhlturm/ — her biri kendi
#    reposunun .git klonu). Migration tamamlanmadan çalıştırılırsa workflow
#    ".git yok" kontrolünde güvenle durur, hiçbir şeyi bozmaz.
#
# GitHub Secrets: VPS_HOST, VPS_USER, VPS_KEY

name: Deploy Ensotek

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Deploy edilecek proje"
        required: true
        type: choice
        options:
          - ensotek_de
          - ensotek_com_tr
          - kompozit
          - kuhlturm

concurrency:
  group: deploy-ensotek-${{ github.event.inputs.project }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 600s
          script: |
            set -e
            export PATH="/usr/local/bin:/root/.bun/bin:$PATH"

            PROJECT="${{ github.event.inputs.project }}"
            PROJ_DIR="/var/www/Ensotek/$PROJECT"

            echo "========== ÖN KOŞUL KONTROLÜ =========="
            if [ ! -d "$PROJ_DIR/.git" ]; then
              echo "HATA: $PROJ_DIR bir git reposu değil."
              echo "VPS henüz poly-repo yapısına taşınmamış — deploy iptal edildi."
              exit 1
            fi

            echo "========== $PROJECT — GIT SYNC =========="
            cd "$PROJ_DIR"
            git fetch origin main
            git reset --hard origin/main

            for APP in backend frontend admin_panel; do
              if [ -f "$PROJ_DIR/$APP/package.json" ]; then
                echo "========== $PROJECT/$APP — BUILD =========="
                cd "$PROJ_DIR/$APP"
                bun install --frozen-lockfile || bun install
                bun run build
              fi
            done

            if [ -f "$PROJ_DIR/backend/package.json" ]; then
              echo "========== $PROJECT — DB SEED (no-drop) =========="
              cd "$PROJ_DIR/backend"
              bun run db:seed:nodrop || echo "Seed atlandı (bloklamaz)"
            fi

            echo "========== PM2 RESTART =========="
            case "$PROJECT" in
              ensotek_de)     PM2_APPS="ensotek-backend ensotek-frontend ensotek-admin-panel" ;;
              ensotek_com_tr) PM2_APPS="ensotek-com-tr-backend ensotek-com-tr-frontend ensotek-com-tr-admin-panel" ;;
              kompozit)       PM2_APPS="kompozit-backend kompozit-frontend kompozit-admin-panel" ;;
              kuhlturm)       PM2_APPS="kuhlturm-frontend" ;;
              *)              PM2_APPS="" ;;
            esac
            for APP in $PM2_APPS; do
              pm2 restart "$APP" || echo "PM2: $APP bulunamadı, atlandı"
            done
            pm2 save

            echo "========== DEPLOY SUCCESS: $PROJECT =========="
