# =============================================================
# karbonkompozit.com.tr — Nginx reverse proxy
# Copy to /etc/nginx/sites-available/karbonkompozit
# ln -s /etc/nginx/sites-available/karbonkompozit /etc/nginx/sites-enabled/
# =============================================================

# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.karbonkompozit.com.tr;
    return 301 https://karbonkompozit.com.tr$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name karbonkompozit.com.tr;
    return 301 https://karbonkompozit.com.tr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.karbonkompozit.com.tr;

    ssl_certificate /etc/letsencrypt/live/karbonkompozit.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/karbonkompozit.com.tr/privkey.pem;

    return 301 https://karbonkompozit.com.tr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name karbonkompozit.com.tr;

    ssl_certificate /etc/letsencrypt/live/karbonkompozit.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/karbonkompozit.com.tr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static assets cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Next.js proxy
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Block common attack vectors
    location ~ /\. {
        deny all;
    }
}
